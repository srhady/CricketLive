name: Sports Private Engine (Cricket & Footy)

on:
  workflow_dispatch: # ম্যানুয়াল রানের জন্য

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 🌐 Checkout Public Repository (CricketLive)
      uses: actions/checkout@v3

    - name: 🔐 Checkout Private Repository (axsportspvt)
      uses: actions/checkout@v3
      with:
        repository: srhady/axsportspvt
        token: ${{ secrets.GH_PAT }}
        path: private_scripts

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests Pillow beautifulsoup4

    - name: 🚀 Run Cricket Engine (Private)
      run: python private_scripts/cricket.py
      continue-on-error: true

    - name: ⚽ Run Footy Engine (Private)
      run: python private_scripts/footy_m3u8.py
      continue-on-error: true

    - name: 💾 Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # ফাইল বা ফোল্ডার না পেলেও এরর দিয়ে ক্র্যাশ করবে না (|| true এর ম্যাজিক)
        git add playlist.m3u || true
        git add posters/ || true
        git add footy_posters/ || true
        
        git diff --quiet && git diff --staged --quiet || git commit -m "⚡ Manual Update: All Engines (Cricket & Footy)"
        git push
